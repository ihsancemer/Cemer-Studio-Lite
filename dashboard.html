<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
  const _supabase = supabase.createClient(
    'https://vdqumssdodfihuovytbs.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZkcXVtc3Nkb2RmaWh1b3Z5dGJzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxNzI1NDgsImV4cCI6MjA4OTc0ODU0OH0.SpKRUbrPmKQtcEDUCwthD-74heZMxTl2R9m9LXN0WQI'
  );

  const BASE_URL = window.location.origin;
  let currentUser = null;
  let userProfile = null;
  let deleteTarget = null;
  let models = [];

  // --- INIT ---
  async function init() {
    const { data: { session } } = await _supabase.auth.getSession();
    if (!session) {
      window.location.href = '/login.html';
      return;
    }
    currentUser = session.user;
    await loadProfile();
    await loadModels();
    await loadAnalytics();
  }

  // --- PROFILE ---
  async function loadProfile() {
    const { data } = await _supabase
      .from('profiles')
      .select('*')
      .eq('id', currentUser.id)
      .single();

    userProfile = data;
    document.getElementById('user-name').textContent = data?.full_name || currentUser.email.split('@')[0];
    document.getElementById('user-email').textContent = currentUser.email;
    document.getElementById('user-plan').textContent = (data?.plan || 'free').toUpperCase();

    const badge = document.getElementById('plan-badge');
    badge.textContent = (data?.plan || 'free').toUpperCase();
    badge.className = 'plan-badge ' + (data?.plan || 'free');

    const limit = data?.model_limit || 3;
    document.getElementById('stat-limit-text').textContent = `/ ${limit} limit`;
    document.getElementById('plan-max').textContent = limit;
  }

  // --- MODELS ---
  async function loadModels() {
    const { data, error } = await _supabase
      .from('models')
      .select('*')
      .eq('user_id', currentUser.id)
      .order('created_at', { ascending: false });

    models = data || [];
    renderModels(models);

    const total = models.length;
    const limit = userProfile?.model_limit || 3;
    document.getElementById('stat-total').textContent = total;
    document.getElementById('model-count').textContent = `${total} model`;
    document.getElementById('plan-used').textContent = total;
    document.getElementById('plan-progress').style.width = Math.min((total / limit) * 100, 100) + '%';
  }

  function renderModels(list) {
    const grid = document.getElementById('model-grid');

    if (list.length === 0) {
      grid.innerHTML = `<div class="empty-state">...</div>`; // Mevcut empty state kalsın
      return;
    }

    grid.innerHTML = list.map(m => {
      // ÖNEMLİ: Viewer "model" parametresini ham isim olarak bekler, 
      // dosya yolundaki "-3d" ekini viewer kendisi ekler.
      const safeName = encodeURIComponent(m.name);
      const { data: thumbData } = _supabase.storage.from('models').getPublicUrl(`${m.name}-thumb.webp`);
      const thumbUrl = `${thumbData.publicUrl}?t=${Date.now()}`;

      return `
      <div class="model-card fade-in">
        <div class="model-thumb">
          <img src="${thumbUrl}" alt="${m.name}" style="width:100%; height:100%; object-fit:cover;" onerror="this.src='placeholder.webp'">
          <span class="model-thumb-label">NATIVE AR READY</span>
        </div>
        <div class="model-body">
          <div class="model-name">${m.name}</div>
          <div class="model-meta">
            <span class="model-meta-item">👁️ ${m.views || 0} görüntü</span>
            <span class="model-meta-item">📅 ${formatDate(m.created_at)}</span>
          </div>
          <div class="model-actions">
            <button class="btn-sm primary" onclick="showLink('${safeName}')">Link</button>
            <a href="upload.html?edit=${safeName}" class="btn-sm">Düzenle</a>
            <button class="btn-sm danger" onclick="askDelete('${safeName}')">Sil</button>
          </div>
        </div>
      </div>`;
    }).join('');
  }

  // --- ANALYTICS ---
  async function loadAnalytics() {
    // Analytics fonksiyonun mevcut haliyle uyumlu, sadece veriyi çekip statlara basıyoruz.
    // ... (Mevcut loadAnalytics kodun burada kalabilir)
  }

  // --- LINK MODAL (Sadeleştirilmiş Viewer ile Tam Uyumlu) ---
  function showLink(safeName) {
    const name = decodeURIComponent(safeName);
    // Viewer kodunda const modelId = params.get('model') kullandığımız için burada da 'model' olarak gönderiyoruz.
    const url = `${BASE_URL}/viewer.html?model=${safeName}`; 
    
    document.getElementById('link-modal-name').textContent = name;
    document.getElementById('link-modal-url').textContent = url;
    document.getElementById('link-modal-open').href = url;
    document.getElementById('link-modal').classList.add('open');
  }

  function copyModalLink() {
    const url = document.getElementById('link-modal-url').textContent;
    navigator.clipboard.writeText(url).then(() => showToast('AR Link kopyalandı', 'success'));
  }

  // --- DİĞER YARDIMCI FONKSİYONLAR ---
  // askDelete, confirmDelete, closeModal, showToast, toggleTheme vb. mevcut kodlarını koruyabilirsin.
  // ...
  
  init();
</script>
