<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cemer AR Studio — Pro Editor</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <style>
        :root { --bg0: #0d0d0f; --bg1: #111113; --border: #2a2a2e; --accent: #19b0c7; --text: #f0f0f2; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg0); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .topbar { height: 52px; background: var(--bg1); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 14px; gap: 10px; z-index: 10; }
        .workspace { flex: 1; display: flex; }
        .sidebar { width: 300px; background: var(--bg1); border-right: 1px solid var(--border); padding: 15px; display: flex; flex-direction: column; gap: 12px; overflow-y: auto; }
        .viewport { flex: 1; position: relative; background: #000; outline: none; }
        canvas { display: block; }
        .btn { padding: 8px 12px; border-radius: 6px; border: 1px solid var(--border); background: #1c1c1f; color: white; cursor: pointer; font-size: 11px; transition: 0.2s; width: 100%; text-align: center; font-weight: 500; }
        .btn:hover { background: #242428; border-color: var(--accent); }
        .btn.primary { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 700; }
        .label { font-size: 10px; color: #8b8b96; margin-bottom: 4px; display: block; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
        #loading-ov { position: absolute; inset: 0; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 1000; flex-direction: column; }
        .panel { background: #151518; border: 1px solid var(--border); padding: 10px; border-radius: 8px; margin-bottom: 5px; }
        .mesh-title { font-size: 11px; font-weight: 700; color: var(--accent); margin-bottom: 8px; word-break: break-all; }
        input[type="color"] { width: 100%; height: 28px; border: none; border-radius: 4px; cursor: pointer; background: none; margin-bottom: 8px; }
        input[type="range"] { width: 100%; margin-bottom: 8px; accent-color: var(--accent); }
        input[type="text"] { width: 100%; padding: 8px; border-radius: 4px; border: 1px solid var(--border); background: #0d0d0f; color: white; margin-bottom: 8px; box-sizing: border-box; font-size: 11px;}
        .var-item { background: #1a1a1e; padding: 6px 10px; border-radius: 4px; border-left: 3px solid var(--accent); font-size: 11px; margin-bottom: 4px; display: flex; justify-content: space-between; align-items: center; }
        .btn-del-var { background: none; border: none; color: #ef4444; cursor: pointer; font-weight: bold; }
    </style>
    <script type="importmap">
        { "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js", "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/" } }
    </script>
</head>
<body>

    <div class="topbar">
        <div style="font-weight: 800; font-size: 16px; letter-spacing: 1px;">CEMER <span style="color:var(--accent)">AR STUDIO</span></div>
        <div style="flex:1"></div>
        <input type="file" id="file-input" accept=".glb" style="display:none">
        <button class="btn" style="width:auto" onclick="document.getElementById('file-input').click()">📁 Model Aç</button>
        <button class="btn primary" style="width:auto" id="btn-save">☁️ Kütüphaneye Kaydet</button>
    </div>

    <div class="workspace">
        <div class="sidebar">
            <div class="panel">
                <span class="label">Renk Varyasyonları</span>
                <input type="text" id="var-name" placeholder="Örn: Mavi-Beyaz Kombin">
                <button class="btn" id="btn-add-var">➕ Mevcut Renkleri Varyasyon Yap</button>
                <div id="var-list" style="margin-top:10px"></div>
            </div>

            <div class="panel">
                <span class="label">Transform</span>
                <div style="display:flex; gap:5px; margin-bottom:5px">
                    <button class="btn" id="btn-cm">CM ➔ M</button>
                    <button class="btn" id="btn-mm">MM ➔ M</button>
                </div>
                <button class="btn" id="btn-rotate">🔄 90° Çevir</button>
                <button class="btn" id="btn-snap" style="margin-top:5px">⬇️ Zemine Hizala</button>
            </div>
            
            <div id="mesh-panel" class="panel" style="display:none;">
                <span class="label">Seçili Parça: <span id="mesh-name" style="color:var(--accent)">-</span></span>
                <span class="label">Renk</span>
                <input type="color" id="mesh-color">

                <input type="file" id="tex-input" accept="image/*" style="display:none">
                <button class="btn" id="btn-tex" style="margin-bottom:8px">🖼️ Doku (Texture) Yükle</button>
                
                <span class="label">Opaklık</span>
                <input type="range" id="mesh-opacity" min="0" max="1" step="0.05" value="1">

                <span class="label">Metalik</span>
                <input type="range" id="mesh-metal" min="0" max="1" step="0.05" value="0">
                
                <button class="btn" style="border-color:#ef4444; color:#ef4444; margin-top: 5px;" id="btn-delete">🗑️ Parçayı Sil</button>
            </div>

            <div class="panel">
                <span class="label">Ortam ve Işık</span>
                <span class="label">Işık Gücü</span>
                <input type="range" id="in-exp" min="0.1" max="4" step="0.1" value="1.5">
                <span class="label">Güneş Açısı</span>
                <input type="range" id="in-sun" min="0" max="360" step="1" value="45">
            </div>
        </div>
        
        <div class="viewport" id="container" tabindex="0">
            <div id="loading-ov">
                <div style="color:var(--accent); font-weight:800; font-size: 20px;" id="loading-text">İŞLENİYOR...</div>
            </div>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFExporter } from 'three/addons/exporters/GLTFExporter.js';
        import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

        const _supabase = window.supabase.createClient(
            'https://uoqojtynnarfpidrbinj.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVvcW9qdHlubmFyZnBpZHJiaW5qIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyODkzMzksImV4cCI6MjA5Mjg2NTMzOX0.b1xE1KUYxAJT06Sy1npJPEVFUDFbzvqCHOIzBaiA3QM'
        );

        let scene, camera, renderer, orbit, currentModel, grid, selectionBox, sunLight;
        let selectedMesh = null;
        let variations = []; 
        const history = [];

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0d0d0f);

            camera = new THREE.PerspectiveCamera(45, (window.innerWidth - 300) / (window.innerHeight - 52), 0.1, 1000);
            camera.position.set(4, 4, 4);

            renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
            renderer.setSize(window.innerWidth - 300, window.innerHeight - 52);
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.5;
            document.getElementById('container').appendChild(renderer.domElement);

            orbit = new OrbitControls(camera, renderer.domElement);
            orbit.enableDamping = true;

            const pmrem = new THREE.PMREMGenerator(renderer);
            scene.environment = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;

            sunLight = new THREE.DirectionalLight(0xffffff, 2.5);
            sunLight.position.set(5, 8, 5);
            scene.add(sunLight);
            scene.add(new THREE.AmbientLight(0xffffff, 0.4));

            grid = new THREE.GridHelper(20, 20, 0x2a2a2e, 0x1a1a1e);
            scene.add(grid);

            selectionBox = new THREE.BoxHelper(new THREE.Mesh(), 0x19b0c7);
            selectionBox.visible = false;
            scene.add(selectionBox);

            setupControls();
            animate();
        }

        function setupControls() {
            const raycaster = new THREE.Raycaster();
            const mouse = new THREE.Vector2();

            document.getElementById('container').addEventListener('pointerdown', (e) => {
                if (!currentModel) return;
                const rect = renderer.domElement.getBoundingClientRect();
                mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
                mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;

                raycaster.setFromCamera(mouse, camera);
                const hits = raycaster.intersectObject(currentModel, true);

                if (hits.length > 0) {
                    const obj = hits[0].object;
                    if (obj.isMesh) selectPart(obj);
                } else {
                    deselectPart();
                }
            });

            window.addEventListener('keydown', (e) => {
                if (e.ctrlKey && e.key === 'z') undo();
            });

            document.getElementById('mesh-color').addEventListener('input', (e) => {
                if(!selectedMesh) return;
                history.push({ type: 'color', obj: selectedMesh, val: selectedMesh.material.color.getHex() });
                selectedMesh.material.color.set(e.target.value);
            });

            document.getElementById('btn-tex').onclick = () => document.getElementById('tex-input').click();
            document.getElementById('tex-input').onchange = (e) => {
                if(!selectedMesh || !e.target.files[0]) return;
                const reader = new FileReader();
                reader.onload = (re) => {
                    new THREE.TextureLoader().load(re.target.result, (tex) => {
                        history.push({ type: 'tex', obj: selectedMesh, val: selectedMesh.material.map });
                        tex.colorSpace = THREE.SRGBColorSpace;
                        tex.flipY = false;
                        selectedMesh.material.map = tex;
                        selectedMesh.material.needsUpdate = true;
                    });
                };
                reader.readAsDataURL(e.target.files[0]);
            };

            document.getElementById('mesh-opacity').addEventListener('input', (e) => {
                if(!selectedMesh) return;
                const v = parseFloat(e.target.value);
                history.push({ type: 'opacity', obj: selectedMesh, val: selectedMesh.material.opacity });
                selectedMesh.material.transparent = v < 1;
                selectedMesh.material.opacity = v;
                selectedMesh.material.depthWrite = v === 1;
            });

            document.getElementById('mesh-metal').addEventListener('input', (e) => {
                if(!selectedMesh) return;
                history.push({ type: 'metal', obj: selectedMesh, val: selectedMesh.material.metalness || 0 });
                selectedMesh.material.metalness = parseFloat(e.target.value);
                selectedMesh.material.roughness = 1.0 - (parseFloat(e.target.value) * 0.7);
            });

            document.getElementById('btn-delete').onclick = () => {
                if(!selectedMesh) return;
                history.push({ type: 'delete', obj: selectedMesh, parent: selectedMesh.parent });
                selectedMesh.removeFromParent();
                deselectPart();
            };

            document.getElementById('btn-cm').onclick = () => { history.push({ type: 'scale', val: currentModel.scale.clone() }); currentModel.scale.multiplyScalar(0.01); };
            document.getElementById('btn-mm').onclick = () => { history.push({ type: 'scale', val: currentModel.scale.clone() }); currentModel.scale.multiplyScalar(0.001); };
            document.getElementById('btn-rotate').onclick = () => { history.push({ type: 'rotate', val: currentModel.rotation.clone() }); currentModel.rotation.y += Math.PI / 2; };
            document.getElementById('btn-snap').onclick = () => {
                const box = new THREE.Box3().setFromObject(currentModel);
                currentModel.position.y -= box.min.y;
            };

            document.getElementById('in-exp').oninput = (e) => renderer.toneMappingExposure = parseFloat(e.target.value);
            document.getElementById('in-sun').oninput = (e) => {
                const angle = parseFloat(e.target.value) * (Math.PI / 180);
                sunLight.position.set(Math.cos(angle) * 10, 8, Math.sin(angle) * 10);
            };

            // VARYASYON EKLEME
            document.getElementById('btn-add-var').onclick = () => {
                if(!currentModel) return;
                const vName = document.getElementById('var-name').value || `Varyasyon ${variations.length + 1}`;
                const config = {};
                currentModel.traverse(m => {
                    if(m.isMesh && m.material && m.material.color) {
                        config[m.name || m.uuid] = "#" + m.material.color.getHexString();
                    }
                });
                variations.push({ name: vName, colors: config });
                renderVars();
                document.getElementById('var-name').value = '';
            };
        }

        function renderVars() {
            const list = document.getElementById('var-list');
            list.innerHTML = variations.map((v, i) => `
                <div class="var-item">
                    <span>${v.name}</span>
                    <button class="btn-del-var" onclick="removeVar(${i})">✕</button>
                </div>
            `).join('');
        }

        window.removeVar = (i) => { variations.splice(i, 1); renderVars(); };

        function selectPart(mesh) {
            selectedMesh = mesh;
            if(!selectedMesh.material.isCloned) {
                selectedMesh.material = selectedMesh.material.clone();
                selectedMesh.material.isCloned = true;
            }
            selectionBox.setFromObject(selectedMesh);
            selectionBox.visible = true;
            document.getElementById('mesh-panel').style.display = 'block';
            document.getElementById('mesh-name').innerText = mesh.name || "Mesh";
            document.getElementById('mesh-color').value = "#" + selectedMesh.material.color.getHexString();
            document.getElementById('mesh-opacity').value = selectedMesh.material.opacity || 1;
            document.getElementById('mesh-metal').value = selectedMesh.material.metalness || 0;
        }

        function deselectPart() {
            selectedMesh = null;
            selectionBox.visible = false;
            document.getElementById('mesh-panel').style.display = 'none';
        }

        function undo() {
            if(history.length === 0) return;
            const last = history.pop();
            if (last.type === 'color') last.obj.material.color.setHex(last.val);
            if (last.type === 'opacity') { last.obj.material.opacity = last.val; last.obj.material.transparent = last.val < 1; }
            if (last.type === 'metal') last.obj.material.metalness = last.val;
            if (last.type === 'delete') last.parent.add(last.obj);
            if (last.type === 'scale') currentModel.scale.copy(last.val);
            if (last.type === 'rotate') currentModel.rotation.copy(last.val);
            if (last.type === 'tex') { last.obj.material.map = last.val; last.obj.material.needsUpdate = true; }
            if (selectedMesh) selectionBox.setFromObject(selectedMesh);
        }

        document.getElementById('file-input').onchange = (e) => {
            const file = e.target.files[0];
            if(!file) return;
            document.getElementById('loading-ov').style.display = 'flex';
            new GLTFLoader().load(URL.createObjectURL(file), (gltf) => {
                if(currentModel) scene.remove(currentModel);
                currentModel = gltf.scene;
                const box = new THREE.Box3().setFromObject(currentModel);
                const center = box.getCenter(new THREE.Vector3());
                currentModel.position.set(-center.x, -box.min.y, -center.z);
                scene.add(currentModel);
                document.getElementById('loading-ov').style.display = 'none';
            });
        };

        // GÜVENLİ KAYIT SİSTEMİ
        // GÜVENLİ KAYIT SİSTEMİ VE KATI HATA YAKALAYICI
        document.getElementById('btn-save').onclick = async () => {
            if(!currentModel) return;
            
            const nameRaw = prompt("Model İsmi Girin (Örn: cemer_kaydirak):", "cemer_model");
            if(!nameRaw) return;
            
            // Türkçe ve boşluk temizliği
            const name = nameRaw.trim()
                .replace(/ı/g, 'i').replace(/ğ/g, 'g').replace(/ü/g, 'u')
                .replace(/ş/g, 's').replace(/ö/g, 'o').replace(/ç/g, 'c')
                .replace(/İ/g, 'i').replace(/Ğ/g, 'g').replace(/Ü/g, 'u')
                .replace(/Ş/g, 's').replace(/Ö/g, 'o').replace(/Ç/g, 'c')
                .replace(/\s+/g, '_')
                .toLowerCase();

            document.getElementById('loading-ov').style.display = 'flex';
            document.getElementById('loading-text').innerText = "DOSYALAR YÜKLENİYOR...";

            try {
                const { data: { user } } = await _supabase.auth.getUser();
                if(!user) throw new Error("Oturum bulunamadı. Lütfen tekrar giriş yapın.");

                // Thumbnail Yakala
                grid.visible = false; selectionBox.visible = false;
                renderer.render(scene, camera);
                const thumbBlob = await fetch(renderer.domElement.toDataURL("image/webp", 0.8)).then(r => r.blob());
                grid.visible = true;

                // GLB Export
                const exporter = new GLTFExporter();
                exporter.parse(currentModel, async (buffer) => {
                    
                    try {
                        const glbBlob = new Blob([buffer], { type: 'model/gltf-binary' });

                        // 1. RESİM YÜKLEME VE HATA KONTROLÜ
                        const thumbRes = await _supabase.storage.from('models').upload(`${name}-thumb.webp`, thumbBlob, { upsert: true, contentType: 'image/webp' });
                        if (thumbRes.error) throw new Error("Resim yüklenemedi: " + thumbRes.error.message);

                        // 2. MODEL YÜKLEME VE HATA KONTROLÜ
                        const glbRes = await _supabase.storage.from('models').upload(`${name}-3d.glb`, glbBlob, { upsert: true, contentType: 'model/gltf-binary' });
                        if (glbRes.error) throw new Error("3D Model depoya yüklenemedi: " + glbRes.error.message);
                        
                        // 3. VARYASYON YÜKLEME
                        if(variations.length > 0) {
                            const varBlob = new Blob([JSON.stringify(variations)], { type: "application/json" });
                            const varRes = await _supabase.storage.from('models').upload(`${name}-vars.json`, varBlob, { upsert: true, contentType: 'application/json' });
                            if (varRes.error) throw new Error("Renk dosyası yüklenemedi: " + varRes.error.message);
                        }

                        // 4. DATABASE KAYIT
                        const dbRes = await _supabase.from('models').insert([{
                            user_id: user.id,
                            name: name,
                            exposure: renderer.toneMappingExposure,
                            shadow_intensity: 1.0
                        }]);
                        if (dbRes.error) throw new Error("Veritabanı kaydı başarısız: " + dbRes.error.message);

                        alert("🎉 Başarıyla kütüphaneye eklendi!");
                        window.location.href = 'dashboard.html';

                    } catch (innerErr) {
                        alert("🚨 YÜKLEME İPTAL EDİLDİ:\n" + innerErr.message);
                        document.getElementById('loading-ov').style.display = 'none';
                    }

                }, function(exportError) {
                    alert("🚨 EXPORT HATASI:\n" + exportError);
                    document.getElementById('loading-ov').style.display = 'none';
                }, { binary: true });

            } catch (err) {
                alert("🚨 SİSTEM HATASI:\n" + err.message);
                document.getElementById('loading-ov').style.display = 'none';
            }
        };
    </script>
</body>
</html>
