<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cemer AR Studio — Ürün Deneyimi</title>
    
    <meta property="og:title" content="Cemer AR Deneyimi">
    <meta property="og:description" content="Ürünü gerçek dünyada, kendi alanınızda görün.">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600&display=swap" rel="stylesheet">
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>

    <style>
        :root { --cemer-turk: #19b0c7; --bg: #f7f5f2; --white: #ffffff; }
        body { margin: 0; background: var(--bg); font-family: 'Outfit', sans-serif; overflow: hidden; }
        
        model-viewer { 
            width: 100vw; height: 100vh; 
            background-color: var(--bg);
            --progress-bar-color: var(--cemer-turk);
        }

        .ar-button {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: var(--cemer-turk); color: white; border: none;
            padding: 16px 32px; border-radius: 50px; font-weight: 600; cursor: pointer;
            box-shadow: 0 10px 25px rgba(25, 176, 199, 0.4); 
            z-index: 10; display: none; font-size: 14px;
            align-items: center; gap: 10px;
            transition: transform 0.2s, background 0.2s;
            text-decoration: none;
        }

        .variant-container {
            position: absolute; top: 25px; left: 0; width: 100%;
            display: flex; justify-content: center; gap: 12px; z-index: 20; 
            padding: 0 20px; box-sizing: border-box; flex-wrap: wrap;
        }
        .variant-btn {
            background: rgba(255, 255, 255, 0.85); border: 1px solid rgba(0,0,0,0.05);
            padding: 10px 20px; border-radius: 25px; font-size: 13px; font-weight: 600;
            cursor: pointer; transition: 0.3s; backdrop-filter: blur(10px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .variant-btn.active { background: var(--cemer-turk); color: white; border-color: var(--cemer-turk); }

        #status-ov { 
            position: fixed; inset: 0; background: var(--bg); 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            z-index: 100; transition: opacity 0.5s ease;
        }
        .spinner { 
            border: 4px solid rgba(25,176,199,0.1); border-left-color: var(--cemer-turk); 
            border-radius: 50%; width: 45px; height: 45px; 
            animation: spin 1s linear infinite; margin-bottom: 20px; 
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        
        #load-bar { width: 150px; height: 4px; background: #ddd; border-radius: 2px; overflow: hidden; margin-top: 10px; }
        #load-fill { width: 0%; height: 100%; background: var(--cemer-turk); transition: width 0.3s; }

        #error-card { 
            display: none; background: white; padding: 30px; border-radius: 15px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); text-align: center; max-width: 80%; 
        }
    </style>
</head>
<body>

    <div id="status-ov">
        <div class="spinner" id="main-spinner"></div>
        <div id="status-text" style="font-weight:600; color:#444;">Ürün Hazırlanıyor...</div>
        <div id="load-bar"><div id="load-fill"></div></div>
        
        <div id="error-card">
            <h3 style="color:#ef4444; margin:0 0 10px 0;">Model Açılamadı</h3>
            <p id="error-desc" style="font-size:14px; color:#666; line-height:1.5; margin-bottom: 20px;"></p>
            <button onclick="location.reload()" class="variant-btn" style="background: #f0f0f0;">Tekrar Dene</button>
        </div>
    </div>

    <div class="variant-container" id="variant-list"></div>

    <model-viewer id="mv" 
        ar 
        ar-modes="webxr scene-viewer quick-look" 
        ar-scale="fixed"
        camera-controls 
        touch-action="pan-y"
        shadow-intensity="1.5" 
        shadow-softness="0.8"
        environment-image="neutral"
        exposure="1.2"
        auto-rotate
        rotation-speed="0.5"
        interpolation-decay="200"
        loading="eager"
        crossorigin="anonymous"
        alt="Cemer 3D Ürün Modeli">
        
        <button slot="ar-button" class="ar-button" id="ar-trigger">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M7 11V7H11V5H7C5.9 5 5 5.9 5 7V11H7ZM17 7V11H19V7C19 5.9 18.1 5 17 5H13V7H17ZM17 17H13V19H17C18.1 19 19 18.1 19 17V13H17V17ZM7 17V13H5V17C5 18.1 5.9 19 7 19H11V17H7ZM12 8C9.79 8 8 9.79 8 12C8 14.21 9.79 16 12 16C14.21 16 16 14.21 16 12C16 9.79 14.21 8 12 8Z"/></svg>
            GERÇEK DÜNYADA GÖR
        </button>
    </model-viewer>

<script>
    const params = new URLSearchParams(window.location.search);
    
    // 1. DASHBOARD'DAN GELEN İSMİ AL VE UPLOAD İLE AYNI MANTIKTA TEMİZLE
    const rawId = decodeURIComponent(params.get('model') || params.get('id') || "");
    
    // Bu kısım Upload tarafındaki temizleme motoruyla %100 aynı:
    // Küçük harf yapar, Türkçe karakterleri İngilizceye çevirir ve boşlukları alt tireye bağlar.
    const modelId = rawId.trim()
        .toLowerCase()
        .replace(/ğ/g, 'g').replace(/ü/g, 'u').replace(/ş/g, 's').replace(/ı/g, 'i').replace(/ö/g, 'o').replace(/ç/g, 'c')
        .replace(/[^a-z0-9]/g, '_')
        .replace(/__+/g, '_')
        .replace(/^_|_$/g, '');

    const mv = document.getElementById('mv');
    const statusOv = document.getElementById('status-ov');
    const loadFill = document.getElementById('load-fill');
    const errorCard = document.getElementById('error-card');

    if (!modelId) {
        showError("Bağlantı Eksik", "Lütfen geçerli bir ürün linki kullanın.");
    } else {
        // 2. URL YAPILANDIRMASI
        const bucketPath = `https://uoqojtynnarfpidrbinj.supabase.co/storage/v1/object/public/models/`;
        const modelUrl = `${bucketPath}${modelId}-3d.glb`;
        const varsUrl = `${bucketPath}${modelId}-vars.json`;
        
        console.log("🔍 PepperAR Sorgulanan Model ID:", modelId);
        console.log("🚀 Viewer'ın Aradığı Tam URL:", modelUrl);
        
        // Modeli yükle
        mv.src = modelUrl;
        
        // iOS için otomatik USDZ üretimini tetiklemek adına ios-src'yi temizliyoruz
        mv.removeAttribute('ios-src'); 

        // Varyasyonları yükle
        loadVariations(varsUrl);

        // Yükleme ilerleme takibi
        mv.addEventListener('progress', (ev) => {
            const progress = ev.detail.totalProgress * 100;
            if (loadFill) loadFill.style.width = `${progress}%`;
        });

        // Başarılı yükleme
        mv.addEventListener('load', () => {
            console.log("✅ Model başarıyla sahneye yüklendi.");
            if (statusOv) {
                statusOv.style.opacity = '0';
                setTimeout(() => statusOv.style.display = 'none', 500);
            }
            const arBtn = document.getElementById('ar-trigger');
            if (arBtn) arBtn.style.display = 'flex';
        });

        // Hata yönetimi
        mv.addEventListener('error', (e) => {
            console.error("❌ Model Viewer Hatası:", e);
            showError("Model Bulunamadı", 
                `"${modelId}-3d.glb" dosyasına erişilemiyor. \n\n` + 
                `İpucu: Dashboard'daki ürün isminin Storage'daki dosya ismiyle birebir aynı olduğundan emin olun.`
            );
        });
    }

    // Varyasyonları dosyadan çekme
    async function loadVariations(url) {
        try {
            // Önbellek sorununu önlemek için zaman damgası (Date.now) ekliyoruz
            const response = await fetch(`${url}?t=${Date.now()}`);
            if (!response.ok) {
                console.log("ℹ️ Bu ürün için varyasyon dosyası (.json) bulunamadı.");
                return; 
            }
            const vars = await response.json();
            if (!vars || vars.length === 0) return;
            
            const container = document.getElementById('variant-list');
            if (!container) return;

            container.innerHTML = ""; // Önceki varyasyonları temizle
            vars.forEach((v) => {
                const btn = document.createElement('button');
                btn.className = `variant-btn`;
                btn.innerText = v.name;
                btn.onclick = () => applyVariation(v.colors, btn);
                container.appendChild(btn);
            });
        } catch (e) { 
            console.warn("⚠️ Varyasyon yükleme sırasında hata oluştu veya dosya yok."); 
        }
    }

    // Seçilen varyasyonu modele uygula
    function applyVariation(colorMap, clickedBtn) {
        document.querySelectorAll('.variant-btn').forEach(b => b.classList.remove('active'));
        clickedBtn.classList.add('active');

        if (!mv.model) {
            console.error("Model henüz hazır değil.");
            return;
        }

        // Malzeme bazlı renk değişimi
        for (const material of mv.model.materials) {
            if (colorMap[material.name]) {
                // Kaydedilen [r, g, b, a] dizisini uygula
                material.pbrMetallicRoughness.setBaseColorFactor(colorMap[material.name]);
            }
        }
    }

    // Hata mesajı gösterme fonksiyonu
    function showError(title, desc) {
        if (document.getElementById('main-spinner')) document.getElementById('main-spinner').style.display = 'none';
        if (document.getElementById('load-bar')) document.getElementById('load-bar').style.display = 'none';
        if (document.getElementById('status-text')) document.getElementById('status-text').style.display = 'none';
        
        if (errorCard) {
            errorCard.style.display = 'block';
            errorCard.querySelector('h3').innerText = title;
            const descEl = document.getElementById('error-desc');
            if (descEl) descEl.innerText = `${desc}\n\nAranan dosya: ${modelId}-3d.glb`;
        }
    }
</script>
</body>
</html>
