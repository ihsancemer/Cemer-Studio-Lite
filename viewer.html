<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cemer AR Studio — Ürün Deneyimi</title>
    
    <meta property="og:title" content="Cemer AR Deneyimi">
    <meta property="og:description" content="Ürünü gerçek dünyada, kendi alanınızda görün.">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600&display=swap" rel="stylesheet">
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>

    <style>
        :root { --cemer-turk: #19b0c7; --bg: #f7f5f2; --white: #ffffff; }
        body { margin: 0; background: var(--bg); font-family: 'Outfit', sans-serif; overflow: hidden; }
        
        model-viewer { 
            width: 100vw; height: 100vh; 
            background-color: var(--bg);
            --progress-bar-color: var(--cemer-turk);
        }

        .ar-button {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: var(--cemer-turk); color: white; border: none;
            padding: 16px 32px; border-radius: 50px; font-weight: 600; cursor: pointer;
            box-shadow: 0 10px 25px rgba(25, 176, 199, 0.4); 
            z-index: 10; display: none; font-size: 14px;
            align-items: center; gap: 10px;
            transition: transform 0.2s, background 0.2s;
            text-decoration: none;
        }

        .variant-container {
            position: absolute; top: 25px; left: 0; width: 100%;
            display: flex; justify-content: center; gap: 12px; z-index: 20; 
            padding: 0 20px; box-sizing: border-box; flex-wrap: wrap;
        }
        .variant-btn {
            background: rgba(255, 255, 255, 0.85); border: 1px solid rgba(0,0,0,0.05);
            padding: 10px 20px; border-radius: 25px; font-size: 13px; font-weight: 600;
            cursor: pointer; transition: 0.3s; backdrop-filter: blur(10px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .variant-btn.active { background: var(--cemer-turk); color: white; border-color: var(--cemer-turk); }

        #status-ov { 
            position: fixed; inset: 0; background: var(--bg); 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            z-index: 100; transition: opacity 0.5s ease;
        }
        .spinner { 
            border: 4px solid rgba(25,176,199,0.1); border-left-color: var(--cemer-turk); 
            border-radius: 50%; width: 45px; height: 45px; 
            animation: spin 1s linear infinite; margin-bottom: 20px; 
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        
        #load-bar { width: 150px; height: 4px; background: #ddd; border-radius: 2px; overflow: hidden; margin-top: 10px; }
        #load-fill { width: 0%; height: 100%; background: var(--cemer-turk); transition: width 0.3s; }

        #error-card { 
            display: none; background: white; padding: 30px; border-radius: 15px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); text-align: center; max-width: 80%; 
        }
    </style>
</head>
<body>

    <div id="status-ov">
        <div class="spinner" id="main-spinner"></div>
        <div id="status-text" style="font-weight:600; color:#444;">Ürün Hazırlanıyor...</div>
        <div id="load-bar"><div id="load-fill"></div></div>
        
        <div id="error-card">
            <h3 style="color:#ef4444; margin:0 0 10px 0;">Model Açılamadı</h3>
            <p id="error-desc" style="font-size:14px; color:#666; line-height:1.5; margin-bottom: 20px;"></p>
            <button onclick="location.reload()" class="variant-btn" style="background: #f0f0f0;">Tekrar Dene</button>
        </div>
    </div>

    <div class="variant-container" id="variant-list"></div>

    <model-viewer id="mv" 
        ar 
        ar-modes="webxr scene-viewer quick-look" 
        ar-scale="fixed"
        camera-controls 
        touch-action="pan-y"
        shadow-intensity="1.5" 
        shadow-softness="0.8"
        environment-image="neutral"
        exposure="1.2"
        auto-rotate
        rotation-speed="0.5"
        interpolation-decay="200"
        loading="eager"
        crossorigin="anonymous"
        alt="Cemer 3D Ürün Modeli">
        
        <button slot="ar-button" class="ar-button" id="ar-trigger">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M7 11V7H11V5H7C5.9 5 5 5.9 5 7V11H7ZM17 7V11H19V7C19 5.9 18.1 5 17 5H13V7H17ZM17 17H13V19H17C18.1 19 19 18.1 19 17V13H17V17ZM7 17V13H5V17C5 18.1 5.9 19 7 19H11V17H7ZM12 8C9.79 8 8 9.79 8 12C8 14.21 9.79 16 12 16C14.21 16 16 14.21 16 12C16 9.79 14.21 8 12 8Z"/></svg>
            GERÇEK DÜNYADA GÖR
        </button>
    </model-viewer>

    <script>
        const params = new URLSearchParams(window.location.search);
        // ID çekme mantığını sağlamlaştırdık
        const modelId = decodeURIComponent(params.get('model') || params.get('id') || "");
        const mv = document.getElementById('mv');
        const statusOv = document.getElementById('status-ov');
        const loadFill = document.getElementById('load-fill');
        const errorCard = document.getElementById('error-card');

        if (!modelId) {
            showError("Bağlantı Eksik", "Lütfen geçerli bir ürün linki kullanın.");
        } else {
            // URL yapılandırmasını kontrol ettik
            const baseUrl = `https://uoqojtynnarfpidrbinj.supabase.co/storage/v1/object/public/models/${modelId}`;
            
            // Dosya yolunu konsola yazdır (Hata ayıklama için)
            console.log("Yüklenen Model Path:", `${baseUrl}-3d.glb`);
            
            mv.src = `${baseUrl}-3d.glb`;
            
            // iOS için USDZ'yi anlık oluşturması için ios-src'yi boş bırakıyoruz
            mv.removeAttribute('ios-src'); 

            loadVariations(`${baseUrl}-vars.json`);

            mv.addEventListener('progress', (ev) => {
                const progress = ev.detail.totalProgress * 100;
                loadFill.style.width = `${progress}%`;
            });

            mv.addEventListener('load', () => {
                console.log("Model başarıyla yüklendi.");
                statusOv.style.opacity = '0';
                setTimeout(() => statusOv.style.display = 'none', 500);
                document.getElementById('ar-trigger').style.display = 'flex';
            });

            mv.addEventListener('error', (e) => {
                console.error("Model Viewer Hatası:", e);
                showError("Model Bulunamadı", `"${modelId}-3d.glb" dosyası sunucuda mevcut değil veya erişim engellendi.`);
            });
        }

        async function loadVariations(url) {
            try {
                const response = await fetch(`${url}?t=${Date.now()}`);
                if (!response.ok) return; 
                const vars = await response.json();
                if (!vars || vars.length === 0) return;
                
                const container = document.getElementById('variant-list');
                vars.forEach((v) => {
                    const btn = document.createElement('button');
                    btn.className = `variant-btn`;
                    btn.innerText = v.name;
                    btn.onclick = () => applyVariation(v.colors, btn);
                    container.appendChild(btn);
                });
            } catch (e) { console.warn("Varyasyon dosyası yüklenemedi."); }
        }

        function applyVariation(colorMap, clickedBtn) {
            document.querySelectorAll('.variant-btn').forEach(b => b.classList.remove('active'));
            clickedBtn.classList.add('active');

            if (!mv.model) return;

            // Renkleri model-viewer standartlarına göre uygula
            for (const material of mv.model.materials) {
                if (colorMap[material.name]) {
                    // Kaydedilen [r, g, b, a] dizisini uygula
                    material.pbrMetallicRoughness.setBaseColorFactor(colorMap[material.name]);
                }
            }
        }

        function showError(title, desc) {
            document.getElementById('main-spinner').style.display = 'none';
            document.getElementById('load-bar').style.display = 'none';
            document.getElementById('status-text').style.display = 'none';
            errorCard.style.display = 'block';
            errorCard.querySelector('h3').innerText = title;
            document.getElementById('error-desc').innerText = desc;
        }
    </script>
</body>
</html>
