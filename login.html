<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cemer AR Studio — Giriş</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <style>
        :root { --bg0: #0d0d0f; --bg1: #111113; --border: #2a2a2e; --accent: #19b0c7; --text: #f0f0f2; }
        * { box-sizing: border-box; }
        body { 
            font-family: 'Outfit', sans-serif; background: var(--bg0); color: var(--text); 
            margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh;
            background-image: radial-gradient(circle at 50% 0%, #1a1a1e 0%, transparent 70%);
        }
        
        .login-card {
            background: var(--bg1); border: 1px solid var(--border); padding: 40px;
            border-radius: 12px; width: 100%; max-width: 400px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4); text-align: center;
        }

        .logo { font-weight: 800; font-size: 24px; margin-bottom: 8px; letter-spacing: 1px; }
        .logo span { color: var(--accent); }
        .subtitle { font-size: 13px; color: #8b8b96; margin-bottom: 30px; }

        .input-group { text-align: left; margin-bottom: 20px; }
        .label { font-size: 11px; color: #8b8b96; margin-bottom: 6px; display: block; font-weight: 600; text-transform: uppercase; }
        input[type="email"], input[type="password"] {
            width: 100%; padding: 12px; border-radius: 6px; border: 1px solid var(--border);
            background: #0d0d0f; color: white; font-family: 'Outfit', sans-serif; font-size: 14px; transition: 0.2s;
        }
        input:focus { outline: none; border-color: var(--accent); }

        .btn {
            width: 100%; padding: 14px; border-radius: 6px; border: none;
            background: var(--accent); color: #000; font-weight: 700; font-family: 'Outfit', sans-serif;
            font-size: 14px; cursor: pointer; transition: 0.2s; margin-top: 10px;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(25, 176, 199, 0.3); }
        .btn:disabled { opacity: 0.7; cursor: not-allowed; transform: none; box-shadow: none; }

        #error-msg {
            color: #ef4444; background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.2);
            padding: 10px; border-radius: 6px; font-size: 12px; margin-bottom: 20px; display: none; text-align: left;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo">CEMER <span>AR STUDIO</span></div>
        <div class="subtitle">Yönetim paneline erişmek için giriş yapın</div>

        <div id="error-msg"></div>

        <form id="login-form">
            <div class="input-group">
                <span class="label">E-Posta Adresi</span>
                <input type="email" id="email" required placeholder="ornek@cemer.com.tr">
            </div>
            
            <div class="input-group">
                <span class="label">Şifre</span>
                <input type="password" id="password" required placeholder="••••••••">
            </div>

            <button type="submit" class="btn" id="submit-btn">Giriş Yap</button>
        </form>
    </div>

    <script>
        // YENİ SUPABASE PROJESİ BAĞLANTISI
        const _supabase = window.supabase.createClient(
            'https://uoqojtynnarfpidrbinj.supabase.co',
            'BURAYA_AZ_ONCE_BULDUGUN_UZUN_ANON_KEY_GELECEK'
        );

        const form = document.getElementById('login-form');
        const btn = document.getElementById('submit-btn');
        const errorMsg = document.getElementById('error-msg');

        // SAYFA YÜKLENDİĞİNDE: Eski hatalı oturumları temizle ve geçerli oturum varsa içeri al
        async function checkSession() {
            const { data: { session }, error } = await _supabase.auth.getSession();
            
            if (session) {
                // Eğer geçerli bir oturum varsa dashboard'a yönlendir
                window.location.replace('dashboard.html');
            } else {
                // Eski projeden kalan çöp veriler varsa zorla temizle (Sonsuz döngüyü kırar)
                localStorage.clear();
            }
        }
        checkSession();

        // GİRİŞ İŞLEMİ
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            btn.disabled = true;
            btn.innerText = "Giriş Yapılıyor...";
            errorMsg.style.display = 'none';

            const { data, error } = await _supabase.auth.signInWithPassword({
                email: email,
                password: password
            });

            if (error) {
                errorMsg.style.display = 'block';
                errorMsg.innerText = "Hata: " + (error.message === "Invalid login credentials" ? "E-posta veya şifre hatalı." : error.message);
                btn.disabled = false;
                btn.innerText = "Giriş Yap";
            } else {
                // Giriş başarılı
                window.location.replace('dashboard.html');
            }
        });
    </script>
</body>
</html>
