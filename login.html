<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cemer AR Studio — Giriş</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <style>
        :root { --bg0: #0d0d0f; --bg1: #111113; --border: #2a2a2e; --accent: #19b0c7; --text: #f0f0f2; }
        * { box-sizing: border-box; }
        body { 
            font-family: 'Outfit', sans-serif; background: var(--bg0); color: var(--text); 
            margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh;
            background-image: radial-gradient(circle at 50% 0%, #1a1a1e 0%, transparent 70%);
        }
        
        .login-card {
            background: var(--bg1); border: 1px solid var(--border); padding: 40px;
            border-radius: 12px; width: 100%; max-width: 400px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4); text-align: center;
        }

        .logo { font-weight: 800; font-size: 24px; margin-bottom: 8px; letter-spacing: 1px; }
        .logo span { color: var(--accent); }
        .subtitle { font-size: 13px; color: #8b8b96; margin-bottom: 30px; }

        .input-group { text-align: left; margin-bottom: 20px; }
        .label { font-size: 11px; color: #8b8b96; margin-bottom: 6px; display: block; font-weight: 600; text-transform: uppercase; }
        input[type="email"], input[type="password"] {
            width: 100%; padding: 12px; border-radius: 6px; border: 1px solid var(--border);
            background: #0d0d0f; color: white; font-family: 'Outfit', sans-serif; font-size: 14px; transition: 0.2s;
        }
        input:focus { outline: none; border-color: var(--accent); }

        .btn {
            width: 100%; padding: 14px; border-radius: 6px; border: none;
            background: var(--accent); color: #000; font-weight: 700; font-family: 'Outfit', sans-serif;
            font-size: 14px; cursor: pointer; transition: 0.2s; margin-top: 10px;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(25, 176, 199, 0.3); }
        .btn:disabled { opacity: 0.7; cursor: not-allowed; transform: none; box-shadow: none; }

        .toggle-text { margin-top: 20px; font-size: 12px; color: #8b8b96; }
        .toggle-text a { color: var(--accent); text-decoration: none; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .toggle-text a:hover { color: #fff; }

        #error-msg {
            color: #ef4444; background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.2);
            padding: 10px; border-radius: 6px; font-size: 12px; margin-bottom: 20px; display: none; text-align: left;
        }
        #success-msg {
            color: #10b981; background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.2);
            padding: 10px; border-radius: 6px; font-size: 12px; margin-bottom: 20px; display: none; text-align: left;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo">CEMER <span>AR STUDIO</span></div>
        <div class="subtitle" id="form-subtitle">Yönetim paneline erişmek için giriş yapın</div>

        <div id="error-msg"></div>
        <div id="success-msg"></div>

        <form id="auth-form">
            <div class="input-group">
                <span class="label">E-Posta Adresi</span>
                <input type="email" id="email" required placeholder="ornek@cemer.com.tr">
            </div>
            
            <div class="input-group">
                <span class="label">Şifre</span>
                <input type="password" id="password" required placeholder="••••••••">
            </div>

            <button type="submit" class="btn" id="submit-btn">Giriş Yap</button>
        </form>

        <div class="toggle-text">
            <span id="toggle-desc">Hesabınız yok mu?</span> 
            <a id="toggle-mode">Kayıt Olun</a>
        </div>
    </div>

    <script>
        // YENİ SUPABASE PROJESİ BAĞLANTISI
        const _supabase = window.supabase.createClient(
            'https://uoqojtynnarfpidrbinj.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVvcW9qdHlubmFyZnBpZHJiaW5qIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyODkzMzksImV4cCI6MjA5Mjg2NTMzOX0.b1xE1KUYxAJT06Sy1npJPEVFUDFbzvqCHOIzBaiA3QM'
        );

        const form = document.getElementById('auth-form');
        const btn = document.getElementById('submit-btn');
        const errorMsg = document.getElementById('error-msg');
        const successMsg = document.getElementById('success-msg');
        
        const subtitle = document.getElementById('form-subtitle');
        const toggleModeBtn = document.getElementById('toggle-mode');
        const toggleDesc = document.getElementById('toggle-desc');

        let isLoginMode = true; // Varsayılan olarak giriş modu

        // Eski hatalı oturumları temizle ve geçerli oturum varsa içeri al
        async function checkSession() {
            const { data: { session } } = await _supabase.auth.getSession();
            if (session) window.location.replace('dashboard.html');
            else localStorage.clear();
        }
        checkSession();

        // GİRİŞ / KAYIT MODU DEĞİŞTİRİCİ
        toggleModeBtn.addEventListener('click', () => {
            isLoginMode = !isLoginMode;
            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';
            
            if (isLoginMode) {
                subtitle.innerText = "Yönetim paneline erişmek için giriş yapın";
                btn.innerText = "Giriş Yap";
                toggleDesc.innerText = "Hesabınız yok mu?";
                toggleModeBtn.innerText = "Kayıt Olun";
            } else {
                subtitle.innerText = "Yeni bir hesap oluşturun";
                btn.innerText = "Kayıt Ol";
                toggleDesc.innerText = "Zaten hesabınız var mı?";
                toggleModeBtn.innerText = "Giriş Yapın";
            }
        });

        // FORM GÖNDERME (Giriş veya Kayıt)
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            btn.disabled = true;
            btn.innerText = "İşlem Yapılıyor...";
            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';

            if (isLoginMode) {
                // --- GİRİŞ YAP ---
                const { data, error } = await _supabase.auth.signInWithPassword({ email, password });
                if (error) {
                    showError(error.message === "Invalid login credentials" ? "E-posta veya şifre hatalı." : error.message);
                } else {
                    window.location.replace('dashboard.html');
                }
            } else {
                // --- KAYIT OL ---
                const { data, error } = await _supabase.auth.signUp({ email, password });
                if (error) {
                    showError("Kayıt Hatası: " + error.message);
                } else {
                    // Kayıt başarılı olduğunda
                    successMsg.style.display = 'block';
                    successMsg.innerText = "Kayıt başarılı! Lütfen giriş yapın.";
                    
                    // Modu tekrar girişe çevir
                    setTimeout(() => toggleModeBtn.click(), 2000); 
                }
            }
        });

        function showError(msg) {
            errorMsg.style.display = 'block';
            errorMsg.innerText = msg;
            btn.disabled = false;
            btn.innerText = isLoginMode ? "Giriş Yap" : "Kayıt Ol";
        }
    </script>
</body>
</html>
